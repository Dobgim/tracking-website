<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Prestige Freight Cargo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: rgba(200,161,78,0.06);
            top: -200px; right: -200px;
            filter: blur(100px);
        }
        .login-page::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(26,58,110,0.3);
            bottom: -150px; left: -100px;
            filter: blur(80px);
        }
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 50px 40px;
            max-width: 440px;
            width: 100%;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 2;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img { height: 50px; margin: 0 auto 12px; }
        .login-logo h2 { font-size: 1.5rem; }
        .login-logo p { color: var(--text-muted); font-size: 0.92rem; margin-top: 6px; }
        .login-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: #f87171;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
        }
        .login-error.show { display: block; }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .login-footer a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="images/logo.png" alt="Prestige Freight Cargo">
                <h2>Admin Portal</h2>
                <p>Sign in to manage shipments and dashboard</p>
            </div>
            <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px; display:flex; align-items:center; gap:8px;">Sign In <i data-lucide="arrow-right"></i></button>
            </form>
            <div class="login-footer">
                <a href="index.html" style="display:flex; align-items:center; justify-content:center; gap:6px;"><i data-lucide="arrow-left" style="width:14px; height:14px;"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <script>
        // Admin credentials (localStorage-based auth)
        const DEFAULT_ADMIN = { username: 'admin', password: 'prestige2026' };

        // Initialize admin credentials if not set
        if (!localStorage.getItem('pf_admin_creds')) {
            localStorage.setItem('pf_admin_creds', JSON.stringify(DEFAULT_ADMIN));
        }

        // Check if already logged in
        if (localStorage.getItem('pf_admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const creds = JSON.parse(localStorage.getItem('pf_admin_creds'));

            if (username === creds.username && password === creds.password) {
                localStorage.setItem('pf_admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('loginError').classList.add('show');
                setTimeout(() => document.getElementById('loginError').classList.remove('show'), 4000);
            }
        });
    </script>
</body>
</html>
